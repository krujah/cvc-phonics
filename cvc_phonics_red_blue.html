<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Phonics Fun!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: linear-gradient(160deg, #FFE566 0%, #FFD700 50%, #FFC200 100%);
  min-height: 100vh;
}

.app { padding: 1rem; max-width: 720px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  background: linear-gradient(135deg, #FF4757, #C0000A);
  border-radius: 24px; padding: 0.9rem 1rem 0.8rem;
  margin-bottom: 1rem;
  box-shadow: 0 6px 0 #8B0000, 0 8px 24px rgba(192,0,10,0.4);
  position: relative; overflow: hidden;
}
.header::after {
  content:''; position:absolute; top:0; left:-50%;
  width:200%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation:shine 3s infinite;
}
@keyframes shine { 0%{left:-50%} 100%{left:100%} }
.header h1 { font-size:24px; font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.3); }
.header p { font-size:12px; color:rgba(255,255,255,0.85); font-weight:700; margin-top:2px; }

/* Vowel Tabs */
.vowel-tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px; margin-bottom: 1rem;
}
.vtab {
  padding: 8px 4px; border-radius: 14px;
  border: 2.5px solid rgba(0,0,0,0.15);
  cursor: pointer; font-weight: 800;
  transition: all 0.18s;
  background: rgba(255,255,255,0.6);
  text-align: center; color: #333;
  box-shadow: 0 4px 0 rgba(0,0,0,0.25);
}
.vtab:hover { transform:translateY(-2px); background:rgba(255,255,255,0.8); }
.vtab:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,0.25); }
.vtab .big { display:block; font-size:20px; line-height:1.2; }
.vtab .ipa { display:block; font-size:11px; font-weight:700; opacity:0.8; }

.vtab[data-v="a"].active { background:#FF4757; border-color:#FF4757; box-shadow:0 4px 0 #8B0000; }
.vtab[data-v="e"].active { background:#2E86FF; border-color:#2E86FF; box-shadow:0 4px 0 #0C447C; }
.vtab[data-v="i"].active { background:#20BF55; border-color:#20BF55; box-shadow:0 4px 0 #0F6E56; }
.vtab[data-v="o"].active { background:#FF8C00; border-color:#FF8C00; box-shadow:0 4px 0 #CC6F00; }
.vtab[data-v="u"].active { background:#9B59B6; border-color:#9B59B6; box-shadow:0 4px 0 #7D3C98; }

/* Slot Section — กรอบสีฟ้า */
.slot-section {
  background: rgba(255,255,255,0.08);
  border-radius: 24px; padding: 1rem;
  margin-bottom: 1rem;
  border: 3px solid #2E86FF;
  box-shadow: 0 0 20px rgba(46,134,255,0.4), 0 6px 0 rgba(0,0,0,0.3);
}
.slot-title {
  text-align:center; font-size:12px; font-weight:800;
  color:rgba(255,255,255,0.7); margin-bottom:0.75rem;
  text-transform:uppercase; letter-spacing:0.5px;
}
.word-area {
  display:grid; grid-template-columns:1fr 36px 1fr 36px 1fr;
  gap:6px; align-items:center;
}
.op-sign {
  text-align:center; font-size:24px; font-weight:900;
  color:#FFD700; text-shadow:0 2px 0 #8B6900; line-height:1;
}
.slot {
  border-radius:18px; min-height:88px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.15s; gap:3px;
  border: 3px solid transparent;
}
.slot:active { transform:scale(0.94); }

.slot.c1 {
  background: linear-gradient(135deg,#0C447C,#185FA5);
  border-color:#2E86FF;
  box-shadow:0 4px 0 #042C53, 0 0 12px rgba(46,134,255,0.3);
}
.slot.v {
  background: linear-gradient(135deg,#FF4757,#C0000A);
  border-color:#FF4757;
  box-shadow:0 4px 0 #4A0000, 0 0 12px rgba(255,71,87,0.3);
}
.slot.c2 {
  background: linear-gradient(135deg,#0C447C,#185FA5);
  border-color:#2E86FF;
  box-shadow:0 4px 0 #042C53, 0 0 12px rgba(46,134,255,0.3);
}
.slot-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.4px; color:rgba(255,255,255,0.7); }
.slot-letter { font-size:38px; font-weight:900; line-height:1; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.3); }
.slot-ipa { font-size:12px; font-weight:700; color:rgba(255,255,255,0.85); }

/* Status & Button */
.status-msg {
  text-align:center; font-size:15px; font-weight:700;
  color:#7A5500; min-height:24px; margin-bottom:0.75rem;
}
.status-msg.good { color:#C0000A; }

.read-btn {
  width:100%; padding:15px; border-radius:50px; border:none;
  background: linear-gradient(135deg,#2E86FF,#185FA5);
  color:#fff; font-size:19px; font-weight:900;
  cursor:pointer; margin-bottom:1rem;
  box-shadow:0 5px 0 #0C447C, 0 0 20px rgba(46,134,255,0.5);
  transition:all 0.15s;
  font-family:'Nunito',sans-serif;
  border: 2px solid rgba(255,255,255,0.2);
}
.read-btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #0C447C, 0 0 28px rgba(46,134,255,0.6); }
.read-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #0C447C; }
.read-btn:disabled {
  background:rgba(255,255,255,0.7); color:rgba(255,255,255,0.3);
  box-shadow:0 4px 0 rgba(0,0,0,0.2); cursor:not-allowed; transform:none;
  border-color:transparent;
}

/* Divider */
.divider-area { display:flex; align-items:center; gap:10px; margin-bottom:0.75rem; }
.divider-line { flex:1; height:2px; background:rgba(46,134,255,0.4); border-radius:2px; }
.divider-text { font-size:12px; font-weight:800; color:#C0000A; white-space:nowrap; }

/* Word Grid */
.word-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.word-card {
  background:rgba(255,255,255,0.7);
  border:2.5px solid #FFD700;
  border-radius:14px; padding:9px 4px 7px;
  text-align:center; cursor:pointer;
  transition:all 0.15s;
  box-shadow:0 3px 0 #B8860B;
}
.word-card:hover { transform:translateY(-3px); background:rgba(255,215,0,0.15); border-color:#FFE44D; box-shadow:0 6px 0 #8B6900, 0 0 10px rgba(255,215,0,0.4); }
.word-card:active { transform:translateY(1px); }

.word-card.active {
  background:#FFB6C1;
  border-color:#FF69B4;
  box-shadow:0 3px 0 #C2185B, 0 0 14px rgba(255,105,180,0.6);
}
.wc-pic { font-size:24px; margin-bottom:2px; }
.wc-word { font-size:15px; font-weight:800; color:#333; }
.wc-word .wc-c { color:#1A5FCC; }
.wc-word .wc-v { color:#C0000A; }
.wc-ipa { font-size:10px; color:#999; margin-top:1px; font-weight:600; }

@keyframes bounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.12)} 60%{transform:scale(0.95)} }
.bounce { animation:bounce 0.35s ease; }
@keyframes pop { 0%{transform:scale(0.85);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
.pop { animation:pop 0.28s ease; }

.btn-home {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px; margin-top: 1rem;
  border-radius: 50px; border: 3px solid #FFD700;
  background: linear-gradient(135deg, #fff, #FFFBE6);
  color: #C0000A; font-size: 15px; font-weight: 900;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 0 #B8860B, 0 0 12px rgba(255,215,0,0.3);
  transition: all 0.18s; text-decoration: none;
}
.btn-home:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #B8860B, 0 0 20px rgba(255,215,0,0.4); background: linear-gradient(135deg, #FFFBE6, #FFD700); }
.btn-home:active { transform: translateY(2px); box-shadow: 0 2px 0 #B8860B; }

/* KruJah Logo */
.krujah-logo {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 0 3px #FFD700, 0 0 0 5px rgba(255,215,0,0.3);
  z-index: 999;
  cursor: pointer;
  transition: all 0.25s;
  animation: floatLogo 3s ease-in-out infinite;
}
.krujah-logo:hover { transform: scale(1.15); box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 3px #FFD700, 0 0 0 8px rgba(255,215,0,0.4); }
.krujah-logo img { width: 100%; height: 100%; object-fit: cover; }
@keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@media print { .krujah-logo { display:none !important; } }

/* Mini Banner */
.mini-banner {
  width: 100%; border-radius: 16px; overflow: hidden;
  margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  max-height: 160px;
}
.mini-banner img {
  width: 100%; height: 160px;
  object-fit: cover; object-position: center top;
  display: block;
}

.mini-banner { width:100%; border-radius:16px; overflow:hidden; margin-bottom:1rem; box-shadow:0 4px 16px rgba(0,0,0,.15); }
.mini-banner img { width:100%; height:auto; display:block; }
</style>

let currentVowel='a', selectedWord=null;
const phonicsUrls={};

function b64ToUrl(b64){
  try{
    const bin=atob(b64); const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([bytes],{type:'audio/mp3'}));
  }catch(e){return null;}
}

'abcdefghijklmnopqrstuvwxyz'.split('').forEach(k=>{
  if(PHONICS_B64[k]) phonicsUrls[k]=b64ToUrl(PHONICS_B64[k]);
});

function playLetter(letter){
  const url=phonicsUrls[letter]; if(!url)return;
  const a=new Audio(url); a.playbackRate=1.0;
  a.play().catch(e=>console.log(e));
}

function playWord(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.72; u.pitch=1.1;
  const vs=window.speechSynthesis.getVoices();
  const pref=['Samantha','Karen','Google US English Female','Microsoft Zira'];
  let v=null; for(const n of pref){v=vs.find(x=>x.name.includes(n));if(v)break;}
  if(!v) v=vs.find(x=>x.lang==='en-US')||vs.find(x=>x.lang.startsWith('en'));
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}

function animBounce(el){ el.classList.remove('bounce'); void el.offsetWidth; el.classList.add('bounce'); }

function setSlots(word){
  const c1=word[0],v=word[1],c2=word.slice(2);
  ['sl-v','sl-c2'].forEach(id=>document.getElementById(id).textContent='_');
  ['si-v','si-c2'].forEach(id=>document.getElementById(id).textContent='');
  document.getElementById('read-btn').disabled=true;
  document.getElementById('status-msg').textContent='🎵 กำลังเล่นเสียง...';
  document.getElementById('status-msg').className='status-msg';

  const s1=document.getElementById('sl-c1');
  s1.textContent=c1.toUpperCase(); animBounce(s1);
  document.getElementById('si-c1').textContent=consonantIPA[c1]||'';
  playLetter(c1);

  setTimeout(()=>{
    const sv=document.getElementById('sl-v');
    sv.textContent=v.toUpperCase(); animBounce(sv);
    document.getElementById('si-v').textContent=ipaDisplay[v]||'';
    playLetter(v);
  },900);

  setTimeout(()=>{
    const s2=document.getElementById('sl-c2');
    s2.textContent=c2.toUpperCase(); animBounce(s2);
    document.getElementById('si-c2').textContent=consonantIPA[c2[0]]||'';
    playLetter(c2[0]);
    setTimeout(()=>{
      document.getElementById('read-btn').disabled=false;
      document.getElementById('status-msg').textContent='👇 กดปุ่มสีฟ้าเพื่ออ่านคำรวม!';
    },700);
  },1800);
}

function clearSlots(){
  ['sl-c1','sl-v','sl-c2'].forEach(id=>document.getElementById(id).textContent='_');
  ['si-c1','si-v','si-c2'].forEach(id=>document.getElementById(id).textContent='');
  document.getElementById('read-btn').disabled=true;
  document.getElementById('status-msg').textContent='👆 เลือกคำจากด้านล่างก่อนเลย!';
  document.getElementById('status-msg').className='status-msg';
}

document.getElementById('slot-c1').onclick=()=>{ if(selectedWord){animBounce(document.getElementById('sl-c1'));playLetter(selectedWord[0]);} };
document.getElementById('slot-v').onclick=()=>{ if(selectedWord){animBounce(document.getElementById('sl-v'));playLetter(selectedWord[1]);} };
document.getElementById('slot-c2').onclick=()=>{ if(selectedWord){animBounce(document.getElementById('sl-c2'));playLetter(selectedWord.slice(2)[0]);} };

document.getElementById('read-btn').onclick=()=>{
  if(!selectedWord)return;
  playWord(selectedWord);
  document.getElementById('status-msg').textContent='🌟 '+selectedWord.toUpperCase()+' — เก่งมาก! 🌟';
  document.getElementById('status-msg').className='status-msg good';
  animBounce(document.getElementById('read-btn'));
};

function renderTabs(){
  const c=document.getElementById('vtabs'); c.innerHTML='';
  vowels.forEach(v=>{
    const b=document.createElement('button');
    b.className='vtab'+(v===currentVowel?' active':'');
    b.setAttribute('data-v',v);
    b.innerHTML='<span class="big">'+v.toUpperCase()+'</span><span class="ipa">'+ipaDisplay[v]+'</span>';
    b.onclick=()=>{currentVowel=v;selectedWord=null;renderTabs();renderGrid();clearSlots();};
    c.appendChild(b);
  });
}

function renderGrid(){
  const g=document.getElementById('word-grid'); g.innerHTML='';
  document.getElementById('grid-title').textContent='📚 คำ CVC สระ '+currentVowel.toUpperCase()+' '+ipaDisplay[currentVowel]+' — 20 คำ';
  data[currentVowel].forEach(item=>{
    const c1=item.w[0],v=item.w[1],rest=item.w.slice(2);
    const div=document.createElement('div');
    div.className='word-card'+(selectedWord===item.w?' active':'');
    div.innerHTML='<div class="wc-pic">'+item.e+'</div>'
      +'<div class="wc-word"><span class="wc-c">'+c1+'</span><span class="wc-v">'+v+'</span><span class="wc-c">'+rest+'</span></div>'
      +'<div class="wc-ipa">'+item.ipa+'</div>';
    div.onclick=()=>{ selectedWord=item.w; renderGrid(); div.classList.add('pop'); setSlots(item.w); };
    g.appendChild(div);
  });
}

renderTabs(); renderGrid();

function goHome(){
  // ถ้าเปิดจากหน้าหลัก ให้กลับไป ถ้าไม่มีประวัติให้แจ้ง
  if(document.referrer && document.referrer !== window.location.href){
    window.history.back();
  } else {
    // เปิดไฟล์ homepage ในโฟลเดอร์เดียวกัน
    const base = window.location.href.substring(0, window.location.href.lastIndexOf('/')+1);
    window.location.href = base + 'cvc_homepage.html';
  }
}
