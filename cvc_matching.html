<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Matching — ลากจับคู่</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { font-family: 'Nunito', system-ui, sans-serif; background: linear-gradient(160deg,#FFE566 0%,#FFD700 60%,#FFC200 100%); min-height: 100vh; }
.app { padding: 1rem; max-width: 720px; margin: 0 auto; }

.header { text-align:center; background:linear-gradient(135deg,#FF4757,#C0000A); border-radius:24px; padding:1rem; margin-bottom:1rem; box-shadow:0 6px 0 #8B0000; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; top:0; left:-50%; width:200%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); animation:shine 3s infinite; }
@keyframes shine{0%{left:-50%}100%{left:100%}}
.header h1 { font-size:24px; font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); }
.header p { font-size:12px; color:rgba(255,255,255,.9); font-weight:700; margin-top:3px; }

.vowel-tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:1rem; }
.vtab { padding:8px 4px; border-radius:14px; border:2.5px solid rgba(255,255,255,.3); cursor:pointer; font-weight:800; background:rgba(255,255,255,.6); text-align:center; transition:all .18s; box-shadow:0 3px 0 rgba(0,0,0,.12); }
.vtab .big { display:block; font-size:20px; line-height:1.2; }
.vtab .ipa { display:block; font-size:11px; font-weight:700; opacity:.7; }
.vtab[data-v="a"].active{background:#FF4757;color:#fff;border-color:#FF4757;box-shadow:0 4px 0 #8B0000;}
.vtab[data-v="e"].active{background:#2E86FF;color:#fff;border-color:#2E86FF;box-shadow:0 4px 0 #0C447C;}
.vtab[data-v="i"].active{background:#20BF55;color:#fff;border-color:#20BF55;box-shadow:0 4px 0 #0F6E56;}
.vtab[data-v="o"].active{background:#FF8C00;color:#fff;border-color:#FF8C00;box-shadow:0 4px 0 #CC6F00;}
.vtab[data-v="u"].active{background:#9B59B6;color:#fff;border-color:#9B59B6;box-shadow:0 4px 0 #7D3C98;}

.score-bar { background:#fff; border-radius:20px; border:3px solid #2E86FF; box-shadow:0 5px 0 #0C447C; padding:.85rem 1.25rem; margin-bottom:1rem; display:flex; align-items:center; gap:12px; }
.score-item { text-align:center; flex:1; }
.score-label { font-size:10px; font-weight:700; color:#999; text-transform:uppercase; }
.score-val { font-size:24px; font-weight:900; }
.score-divider { width:1px; height:36px; background:#EEE; }

.game-card { background:#fff; border-radius:24px; border:3px solid #FFD700; box-shadow:0 6px 0 #B8860B; padding:1.25rem; margin-bottom:1rem; }
.hint { font-size:13px; font-weight:700; color:#7A5500; text-align:center; margin-bottom:1rem; padding:8px; background:#FFFBE6; border-radius:12px; }

/* Layout: ภาพซ้าย คำขวา */
.game-layout { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.col-label { font-size:12px; font-weight:800; color:#999; text-align:center; margin-bottom:8px; text-transform:uppercase; letter-spacing:.05em; }

/* ===== DRAG SOURCE: ภาพ ===== */
.img-card {
  background:linear-gradient(135deg,#FFFBE6,#FFF8E0);
  border:2.5px solid #FFD700;
  border-radius:16px; padding:10px 6px;
  text-align:center; cursor:grab;
  transition:all .15s; margin-bottom:8px;
  box-shadow:0 4px 0 #B8860B;
  touch-action: none;
}
.img-card:active { cursor:grabbing; }
.img-card.dragging { opacity:.4; transform:scale(.95); }
.img-card.matched { background:linear-gradient(135deg,#EEFFF5,#D4FFE8); border-color:#20BF55; box-shadow:0 4px 0 #0F6E56; cursor:default; opacity:.85; }
.img-card.matched .drag-hint { display:none; }
.img-emoji { font-size:36px; display:block; margin-bottom:3px; }
.drag-hint { font-size:10px; color:#CCC; font-weight:700; }
.match-check { font-size:18px; }

/* ===== DROP TARGET: คำ ===== */
.word-drop {
  background:linear-gradient(135deg,#EEF4FF,#E0ECFF);
  border:2.5px dashed #2E86FF;
  border-radius:16px; padding:12px 8px;
  text-align:center; margin-bottom:8px;
  transition:all .15s; min-height:64px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
}
.word-drop.drag-over { background:#EEF4FF; border-color:#FF4757; border-style:solid; transform:scale(1.04); box-shadow:0 0 0 3px rgba(255,71,87,.2); }
.word-drop.matched { background:linear-gradient(135deg,#EEFFF5,#D4FFE8); border-color:#20BF55; border-style:solid; box-shadow:0 4px 0 #0F6E56; }
.word-drop.wrong-flash { animation:wrongFlash .4s ease; }
@keyframes wrongFlash{0%,100%{background:linear-gradient(135deg,#EEF4FF,#E0ECFF)}50%{background:#FFF0F1;border-color:#FF4757;border-style:solid;}}
.word-text { font-size:22px; font-weight:900; }
.word-text .c { color:#4455CC; }
.word-text .v { color:#CC4400; }
.word-drop-hint { font-size:11px; color:#AAA; font-weight:700; margin-top:2px; }
.word-drop.matched .word-drop-hint { display:none; }

/* Ghost drag image */
.drag-ghost { position:fixed; pointer-events:none; z-index:9999; background:#fff; border-radius:14px; border:2.5px solid #FFD700; padding:8px 12px; font-size:32px; box-shadow:0 8px 24px rgba(0,0,0,.25); transform:translate(-50%,-50%) rotate(5deg) scale(1.1); transition:none; }

/* Celebration */
.overlay { position:fixed; inset:0; pointer-events:none; z-index:998; overflow:hidden; }
.particle { position:absolute; animation:fall 1.4s ease-in forwards; pointer-events:none; }
@keyframes fall{0%{transform:translateY(-60px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.cheer { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border-radius:24px; padding:1.25rem 2rem; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.2); z-index:1000; pointer-events:none; animation:popIn .35s cubic-bezier(.34,1.56,.64,1) forwards; min-width:200px; }
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0)}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes popOut{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(.85);opacity:0}}
.cheer-emoji { font-size:48px; display:block; margin-bottom:6px; }
.cheer-text { font-size:18px; font-weight:900; }
.cheer-sub { font-size:12px; color:#666; font-weight:600; margin-top:3px; }

/* Result */
.result-card { background:#fff; border-radius:24px; border:3px solid #FFD700; box-shadow:0 6px 0 #B8860B; padding:2rem 1.5rem; text-align:center; margin-bottom:1rem; }
.result-emoji { font-size:64px; margin-bottom:.5rem; }
.result-title { font-size:26px; font-weight:900; color:#C0000A; margin-bottom:.5rem; }
.result-score { font-size:42px; font-weight:900; color:#2E86FF; }
.result-sub { font-size:14px; color:#666; font-weight:600; margin:.5rem 0 1.5rem; }
.stars { font-size:36px; margin-bottom:.75rem; letter-spacing:4px; }
.result-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-retry { padding:12px; border-radius:50px; border:none; background:linear-gradient(135deg,#FF4757,#C0000A); color:#fff; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #8B0000; }
.btn-home-r { padding:12px; border-radius:50px; border:3px solid #FFD700; background:#fff; color:#C0000A; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; }

.home-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:50px; border:3px solid #FFD700; background:linear-gradient(135deg,#fff,#FFFBE6); color:#C0000A; font-size:14px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; transition:all .18s; margin-top:.25rem; }
.home-btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #B8860B; }

/* KruJah Logo */
.krujah-logo {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 0 3px #FFD700, 0 0 0 5px rgba(255,215,0,0.3);
  z-index: 999;
  cursor: pointer;
  transition: all 0.25s;
  animation: floatLogo 3s ease-in-out infinite;
}
.krujah-logo:hover { transform: scale(1.15); box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 3px #FFD700, 0 0 0 8px rgba(255,215,0,0.4); }
.krujah-logo img { width: 100%; height: 100%; object-fit: cover; }
@keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@media print { .krujah-logo { display:none !important; } }

/* Mini Banner */
.mini-banner {
  width: 100%; border-radius: 16px; overflow: hidden;
  margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  max-height: 160px;
}
.mini-banner img {
  width: 100%; height: 160px;
  object-fit: cover; object-position: center top;
  display: block;
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div id="cheer" style="display:none"></div>
<div id="drag-ghost" class="drag-ghost" style="display:none"></div>

<div class="app">
  <div class="header">
    <h1>🧩 ลากจับคู่ CVC</h1>
    <p>ลากภาพไปวางที่คำที่ตรงกัน!</p>
  </div>

  <div class="vowel-tabs" id="vtabs"></div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">จับคู่ได้</div>
      <div class="score-val" style="color:#20BF55" id="sc-matched">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-label">เหลือ</div>
      <div class="score-val" style="color:#2E86FF" id="sc-left">6</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-label">ผิด</div>
      <div class="score-val" style="color:#FF4757" id="sc-wrong">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-label">คะแนน</div>
      <div class="score-val" style="color:#FF8C00" id="sc-score">0</div>
    </div>
  </div>

  <div class="game-card" id="game-card">
    <div class="hint">👆 ลากภาพด้านซ้าย ไปวางที่คำด้านขวา</div>
    <div class="game-layout">
      <div>
        <div class="col-label">🖼️ ภาพ</div>
        <div id="img-col"></div>
      </div>
      <div>
        <div class="col-label">🔤 คำ</div>
        <div id="word-col"></div>
      </div>
    </div>
  </div>

  <div class="result-card" id="result-card" style="display:none">
    <div class="result-emoji" id="r-emoji">🏆</div>
    <div class="result-title" id="r-title">เยี่ยมมาก!</div>
    <div class="stars" id="r-stars">⭐⭐⭐</div>
    <div class="result-score" id="r-score">60 คะแนน</div>
    <div class="result-sub" id="r-sub">จับคู่ถูกทั้งหมด!</div>
    <div class="result-btns">
      <button class="btn-retry" onclick="startGame()">🔄 เล่นอีกครั้ง</button>
      <button class="btn-home-r" onclick="goHome()">🏠 หน้าหลัก</button>
    </div>
  </div>

  <button class="home-btn" onclick="goHome()">🏠 กลับหน้าหลัก — CVC Phonics World</button>
</div>

const vowelColors={a:'#FF4757',e:'#2E86FF',i:'#20BF55',o:'#FF8C00',u:'#9B59B6'};
const ipaDisplay={a:'/æ/',e:'/e/',i:'/ɪ/',o:'/ɒ/',u:'/ʌ/'};
const vowels=['a','e','i','o','u'];

let currentVowel='a', matched=0, wrongCount=0, score=0, roundItems=[];
let dragWord=null, dragEl=null, ttsVoice=null;

// Phonics
const phonicsUrls={};
(function(){
  Object.keys(PHONICS_B64).forEach(k=>{
    try{
      const bin=atob(PHONICS_B64[k]);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      phonicsUrls[k]=URL.createObjectURL(new Blob([bytes],{type:'audio/mp3'}));
    }catch(e){}
  });
})();

function loadVoice(){
  const vs=window.speechSynthesis.getVoices();
  const pref=['Samantha','Karen','Google US English Female','Microsoft Zira'];
  for(const n of pref){const v=vs.find(x=>x.name.includes(n));if(v){ttsVoice=v;break;}}
  if(!ttsVoice) ttsVoice=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||null;
}
if(window.speechSynthesis){loadVoice();window.speechSynthesis.onvoiceschanged=loadVoice;}

function tts(text,rate=0.72){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=1.1;
  if(ttsVoice)u.voice=ttsVoice;
  window.speechSynthesis.speak(u);
}

function playWord(word){
  const letters=word.split('');
  let i=0;
  function next(){
    if(i>=letters.length){ setTimeout(()=>tts(word,0.72),200); return; }
    const url=phonicsUrls[letters[i]];
    if(url){
      const a=new Audio(url); a.playbackRate=0.9;
      a.onended=()=>{i++;setTimeout(next,180);};
      a.play().catch(()=>{i++;setTimeout(next,180);});
    } else { i++;setTimeout(next,180); }
  }
  next();
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

function startGame(){
  matched=0; wrongCount=0; score=0; dragWord=null; dragEl=null;
  document.getElementById('result-card').style.display='none';
  document.getElementById('game-card').style.display='block';
  document.getElementById('drag-ghost').style.display='none';
  updateScore();

  roundItems=shuffle(gameData[currentVowel]).slice(0,6);
  const shuffledWords=shuffle([...roundItems]);

  document.getElementById('sc-left').textContent=roundItems.length;
  document.getElementById('game-card').style.borderColor=vowelColors[currentVowel];

  // ภาพ (drag source) — เรียงตามลำดับ
  const imgCol=document.getElementById('img-col'); imgCol.innerHTML='';
  roundItems.forEach(item=>{
    const div=document.createElement('div');
    div.className='img-card'; div.dataset.word=item.w; div.id='img-'+item.w;
    div.innerHTML=`<span class="img-emoji">${item.e}</span><div class="drag-hint">✊ ลากไปวาง</div>`;
    setupDrag(div, item);
    imgCol.appendChild(div);
  });

  // คำ (drop target) — สุ่มลำดับ
  const wordCol=document.getElementById('word-col'); wordCol.innerHTML='';
  shuffledWords.forEach(item=>{
    const div=document.createElement('div');
    div.className='word-drop'; div.dataset.word=item.w; div.id='drop-'+item.w;
    const c1=item.w[0],v=item.w[1],c2=item.w.slice(2);
    div.innerHTML=`<div class="word-text"><span class="c">${c1.toUpperCase()}</span><span class="v">${v.toUpperCase()}</span><span class="c">${c2.toUpperCase()}</span></div><div class="word-drop-hint">วางที่นี่</div>`;
    setupDrop(div);
    wordCol.appendChild(div);
  });
}

function updateScore(){
  document.getElementById('sc-matched').textContent=matched;
  document.getElementById('sc-left').textContent=roundItems.length-matched;
  document.getElementById('sc-wrong').textContent=wrongCount;
  document.getElementById('sc-score').textContent=score;
}

// ===== DRAG SETUP (mouse + touch) =====
function setupDrag(el, item){
  // Mouse
  el.addEventListener('mousedown', e=>{
    if(el.classList.contains('matched'))return;
    startDrag(el, item, e.clientX, e.clientY);
    playWord(item.w);
  });
  // Touch
  el.addEventListener('touchstart', e=>{
    if(el.classList.contains('matched'))return;
    const t=e.touches[0];
    startDrag(el, item, t.clientX, t.clientY);
    playWord(item.w);
    e.preventDefault();
  },{passive:false});
}

function startDrag(el, item, x, y){
  dragWord=item.w; dragEl=el;
  el.classList.add('dragging');
  const ghost=document.getElementById('drag-ghost');
  ghost.textContent=item.e;
  ghost.style.display='block';
  ghost.style.left=x+'px'; ghost.style.top=y+'px';
}

document.addEventListener('mousemove', e=>moveDrag(e.clientX,e.clientY));
document.addEventListener('touchmove', e=>{
  if(!dragWord)return;
  const t=e.touches[0];
  moveDrag(t.clientX,t.clientY);
  e.preventDefault();
},{passive:false});

function moveDrag(x,y){
  if(!dragWord)return;
  const ghost=document.getElementById('drag-ghost');
  ghost.style.left=x+'px'; ghost.style.top=y+'px';
  // highlight drop zone
  document.querySelectorAll('.word-drop:not(.matched)').forEach(d=>{
    const r=d.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) d.classList.add('drag-over');
    else d.classList.remove('drag-over');
  });
}

document.addEventListener('mouseup', e=>endDrag(e.clientX,e.clientY));
document.addEventListener('touchend', e=>{
  if(!dragWord)return;
  const t=e.changedTouches[0];
  endDrag(t.clientX,t.clientY);
});

function endDrag(x,y){
  if(!dragWord)return;
  document.getElementById('drag-ghost').style.display='none';
  if(dragEl) dragEl.classList.remove('dragging');
  document.querySelectorAll('.word-drop').forEach(d=>d.classList.remove('drag-over'));

  // หา drop zone ที่ตรงกับ cursor
  let dropped=null;
  document.querySelectorAll('.word-drop:not(.matched)').forEach(d=>{
    const r=d.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) dropped=d;
  });

  if(dropped){
    const targetWord=dropped.dataset.word;
    if(dragWord===targetWord){
      // ถูก!
      dropped.classList.add('matched');
      const imgCard=document.getElementById('img-'+dragWord);
      if(imgCard){ imgCard.classList.add('matched'); imgCard.innerHTML+=`<span class="match-check">✅</span>`; }
      matched++; score+=10;
      updateScore();
      tts(dragWord,0.72);
      showCheer(true);
      if(matched===roundItems.length) setTimeout(showResult,800);
    } else {
      // ผิด
      dropped.classList.add('wrong-flash');
      setTimeout(()=>dropped.classList.remove('wrong-flash'),450);
      wrongCount++; score=Math.max(0,score-2);
      updateScore();
      showCheer(false);
    }
  }
  dragWord=null; dragEl=null;
}

function setupDrop(el){
  el.addEventListener('dragover',e=>e.preventDefault());
  el.addEventListener('drop',e=>{ e.preventDefault(); endDrag(e.clientX,e.clientY); });
}

// Celebration
const cMsgs=[{e:'🌟',t:'จับคู่ถูก!',s:'เก่งมาก!'},{e:'🎉',t:'ยอดเยี่ยม!',s:'ถูกต้องเลย!'},{e:'⭐',t:'สุดยอด!',s:'เก่งมากๆ!'}];
const wMsgs=[{e:'💪',t:'ลองอีกครั้ง!',s:'ดูดีๆ นะ'},{e:'😊',t:'ไม่เป็นไร!',s:'ใกล้ถูกแล้ว'},{e:'🤗',t:'สู้ต่อไป!',s:'ทำได้แน่!'}];

function showCheer(ok){
  const overlay=document.getElementById('overlay');
  const cheer=document.getElementById('cheer');
  const msgs=ok?cMsgs:wMsgs;
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  cheer.className='cheer '+(ok?'correct':'wrong');
  cheer.style.border='3px solid '+(ok?'#FFD700':'#FF4757');
  cheer.innerHTML=`<span class="cheer-emoji">${m.e}</span><div class="cheer-text" style="color:${ok?'#C0000A':'#2E86FF'}">${m.t}</div><div class="cheer-sub">${m.s}</div>`;
  cheer.style.display='block';
  cheer.style.animation='popIn .35s cubic-bezier(.34,1.56,.64,1) forwards';
  if(ok){
    overlay.innerHTML='';
    const icons=['⭐','🌟','✨','💫','🎊','🧩'];
    for(let i=0;i<16;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.textContent=icons[Math.floor(Math.random()*icons.length)];
      p.style.cssText=`left:${Math.random()*100}vw;top:-40px;font-size:${18+Math.random()*16}px;animation-delay:${Math.random()*.5}s`;
      overlay.appendChild(p);
    }
  }
  setTimeout(()=>{
    cheer.style.animation='popOut .3s ease forwards';
    setTimeout(()=>{cheer.style.display='none';overlay.innerHTML='';},300);
  },1400);
}

function showResult(){
  document.getElementById('game-card').style.display='none';
  document.getElementById('result-card').style.display='block';
  const perfect=wrongCount===0;
  document.getElementById('r-emoji').textContent=perfect?'🏆':score>=40?'🌟':'😊';
  document.getElementById('r-title').textContent=perfect?'เพอร์เฟกต์!':score>=40?'เก่งมาก!':'สู้ต่อไป!';
  document.getElementById('r-stars').textContent=perfect?'⭐⭐⭐':wrongCount<=2?'⭐⭐☆':'⭐☆☆';
  document.getElementById('r-score').textContent=score+' คะแนน';
  document.getElementById('r-sub').textContent=perfect?'ลากจับคู่ถูกหมด ไม่มีผิดเลย!':wrongCount<=2?'เก่งมาก ผิดนิดเดียว!':'ลองฝึกดูใหม่อีกครั้งนะ!';
  if(perfect){
    const o=document.getElementById('overlay'); o.innerHTML='';
    for(let i=0;i<30;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.textContent=['⭐','🌟','✨','💫','🎊','🏆','🎉'][Math.floor(Math.random()*7)];
      p.style.cssText=`left:${Math.random()*100}vw;top:-40px;font-size:${20+Math.random()*20}px;animation-delay:${Math.random()*.8}s`;
      o.appendChild(p);
    }
  }
}

function renderTabs(){
  const c=document.getElementById('vtabs');c.innerHTML='';
  vowels.forEach(v=>{
    const b=document.createElement('button');
    b.className='vtab'+(v===currentVowel?' active':'');
    b.setAttribute('data-v',v);
    b.innerHTML=`<span class="big">${v.toUpperCase()}</span><span class="ipa">${ipaDisplay[v]}</span>`;
    b.onclick=()=>{currentVowel=v;renderTabs();startGame();};
    c.appendChild(b);
  });
}

function goHome(){
  const base=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  window.location.href=base+'cvc_homepage.html';
}

renderTabs();
startGame();
</script>
