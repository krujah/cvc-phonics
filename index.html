<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=cvc_homepage.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Phonics World</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: linear-gradient(160deg, #FFE566 0%, #FFD700 60%, #FFC200 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.box {
  text-align: center;
  background: #fff;
  border-radius: 24px;
  padding: 2.5rem 3rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  border: 3px solid #FFD700;
}
.emoji { font-size: 64px; margin-bottom: 1rem; display: block;
  animation: bounce 1s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
h1 { font-size: 28px; font-weight: 900; color: #C0000A; margin-bottom: .5rem; }
p  { font-size: 15px; color: #666; font-weight: 600; margin-bottom: 1.5rem; }
a  {
  display: inline-block;
  background: linear-gradient(135deg, #FF4757, #C0000A);
  color: #fff; font-size: 15px; font-weight: 900;
  padding: 12px 32px; border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 4px 0 #8B0000;
  transition: all .15s;
}
a:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #8B0000; }
</style>
</head>
<body>
<div class="box">
  <span class="emoji">🌟</span>
  <h1>CVC Phonics World</h1>
  <p>กำลังเข้าสู่หน้าหลัก...</p>
  <a href="cvc_homepage.html">เข้าสู่เว็บไซต์ →</a>
</div>
<script>
window.location.replace('cvc_homepage.html');
</script>
</body>
</html>
