<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Quiz — แบบทดสอบ Phonics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', system-ui, sans-serif; background: linear-gradient(160deg, #FFE566 0%, #FFD700 60%, #FFC200 100%); min-height: 100vh; }
.app { padding: 1rem; max-width: 700px; margin: 0 auto; }

/* Header */
.header { text-align:center; background:linear-gradient(135deg,#FF4757,#C0000A); border-radius:24px; padding:1rem; margin-bottom:1rem; box-shadow:0 6px 0 #8B0000,0 8px 24px rgba(192,0,10,.35); position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; top:0; left:-50%; width:200%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); animation:shine 3s infinite; }
@keyframes shine{0%{left:-50%}100%{left:100%}}
.header h1 { font-size:24px; font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); }
.header p { font-size:12px; color:rgba(255,255,255,.9); font-weight:700; margin-top:3px; }

/* Vowel selector */
.vowel-tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:1rem; }
.vtab { padding:8px 4px; border-radius:14px; border:2.5px solid rgba(255,255,255,.3); cursor:pointer; font-weight:800; background:rgba(255,255,255,.6); text-align:center; transition:all .18s; box-shadow:0 3px 0 rgba(0,0,0,.12); }
.vtab:hover { transform:translateY(-2px); }
.vtab .big { display:block; font-size:20px; line-height:1.2; }
.vtab .ipa { display:block; font-size:11px; font-weight:700; opacity:.7; }
.vtab[data-v="a"].active { background:#FF4757; color:#fff; border-color:#FF4757; box-shadow:0 4px 0 #8B0000; }
.vtab[data-v="e"].active { background:#2E86FF; color:#fff; border-color:#2E86FF; box-shadow:0 4px 0 #0C447C; }
.vtab[data-v="i"].active { background:#20BF55; color:#fff; border-color:#20BF55; box-shadow:0 4px 0 #0F6E56; }
.vtab[data-v="o"].active { background:#FF8C00; color:#fff; border-color:#FF8C00; box-shadow:0 4px 0 #CC6F00; }
.vtab[data-v="u"].active { background:#9B59B6; color:#fff; border-color:#9B59B6; box-shadow:0 4px 0 #7D3C98; }

/* Quiz Card */
.quiz-card { background:#fff; border-radius:24px; border:3px solid #2E86FF; box-shadow:0 6px 0 #0C447C,0 0 20px rgba(46,134,255,.2); padding:1.5rem; margin-bottom:1rem; }

/* Progress */
.progress-wrap { margin-bottom:1.25rem; }
.progress-info { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.progress-text { font-size:13px; font-weight:700; color:#666; }
.score-text { font-size:13px; font-weight:800; color:#FF4757; }
.progress-bar { height:10px; background:#F0F0F0; border-radius:10px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#FF4757,#FFD700); border-radius:10px; transition:width .4s ease; }

/* Question */
.question-area { text-align:center; margin-bottom:1.5rem; }
.question-label { font-size:13px; font-weight:700; color:#999; margin-bottom:0.75rem; text-transform:uppercase; letter-spacing:.05em; }
.listen-btn {
  width:100px; height:100px; border-radius:50%; border:none;
  background:linear-gradient(135deg,#FF4757,#C0000A);
  color:#fff; font-size:36px; cursor:pointer;
  box-shadow:0 6px 0 #8B0000,0 0 20px rgba(255,71,87,.3);
  transition:all .15s; display:inline-flex; align-items:center; justify-content:center;
  animation:pulse 2s ease-in-out infinite;
}
.listen-btn:hover { transform:scale(1.05); box-shadow:0 8px 0 #8B0000; }
.listen-btn:active { transform:scale(0.96); box-shadow:0 3px 0 #8B0000; animation:none; }
@keyframes pulse { 0%,100%{box-shadow:0 6px 0 #8B0000,0 0 20px rgba(255,71,87,.3)} 50%{box-shadow:0 6px 0 #8B0000,0 0 30px rgba(255,71,87,.6)} }
.listen-hint { font-size:12px; color:#999; font-weight:600; margin-top:8px; }

/* Choices */
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem; }
.choice-btn {
  padding:16px 10px; border-radius:16px;
  border:2.5px solid #FFD700;
  background:rgba(255,255,255,.8);
  font-size:22px; font-weight:900; cursor:pointer;
  transition:all .15s; text-align:center;
  box-shadow:0 4px 0 #B8860B;
  font-family:'Nunito',sans-serif;
}
.choice-btn:hover:not(:disabled) { transform:translateY(-3px); background:#FFFBE6; box-shadow:0 7px 0 #B8860B; }
.choice-btn:active:not(:disabled) { transform:translateY(1px); box-shadow:0 2px 0 #B8860B; }
.choice-btn.correct { background:#EEFFF5; border-color:#20BF55; color:#0F6E56; box-shadow:0 4px 0 #0F6E56; }
.choice-btn.wrong { background:#FFF0F1; border-color:#FF4757; color:#C0000A; box-shadow:0 4px 0 #8B0000; }
.choice-btn:disabled { cursor:not-allowed; }

.choice-sub { font-size:11px; font-weight:700; color:#AAA; margin-top:3px; }
.choice-btn.correct .choice-sub { color:#20BF55; }
.choice-btn.wrong .choice-sub { color:#FF4757; }

/* Feedback */
.feedback { text-align:center; font-size:18px; font-weight:900; min-height:28px; margin-bottom:0.75rem; }
.feedback.correct { color:#20BF55; }
.feedback.wrong { color:#FF4757; }

/* Next btn */
.next-btn {
  width:100%; padding:14px; border-radius:50px; border:none;
  background:linear-gradient(135deg,#2E86FF,#185FA5);
  color:#fff; font-size:17px; font-weight:900;
  cursor:pointer; font-family:'Nunito',sans-serif;
  box-shadow:0 5px 0 #0C447C; transition:all .15s;
  display:none;
}
.next-btn.show { display:block; }
.next-btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #0C447C; }
.next-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #0C447C; }

/* Result */
.result-card { background:#fff; border-radius:24px; border:3px solid #FFD700; box-shadow:0 6px 0 #B8860B; padding:2rem 1.5rem; text-align:center; display:none; margin-bottom:1rem; }
.result-emoji { font-size:64px; margin-bottom:0.5rem; }
.result-title { font-size:26px; font-weight:900; color:#C0000A; margin-bottom:0.5rem; }
.result-score { font-size:42px; font-weight:900; color:#2E86FF; margin-bottom:0.5rem; }
.result-sub { font-size:14px; color:#666; font-weight:600; margin-bottom:1.5rem; }
.stars { font-size:36px; margin-bottom:1rem; letter-spacing:4px; }
.result-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-retry { padding:12px; border-radius:50px; border:none; background:linear-gradient(135deg,#FF4757,#C0000A); color:#fff; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #8B0000; }
.btn-home { padding:12px; border-radius:50px; border:3px solid #FFD700; background:#fff; color:#C0000A; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; text-decoration:none; display:block; }

/* Home btn */
.home-link { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:50px; border:3px solid #FFD700; background:linear-gradient(135deg,#fff,#FFFBE6); color:#C0000A; font-size:14px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; text-decoration:none; transition:all .18s; margin-top:.75rem; }
.home-link:hover { transform:translateY(-2px); box-shadow:0 7px 0 #B8860B; }

/* ===== Celebration overlay ===== */
.overlay {
  position: fixed; inset: 0; pointer-events: none;
  z-index: 999; overflow: hidden;
}
.particle {
  position: absolute; font-size: 28px;
  animation: fall 1.4s ease-in forwards;
  pointer-events: none;
}
@keyframes fall {
  0%   { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.6); opacity: 0; }
}

/* ===== Cheer banner ===== */
.cheer-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #fff; border-radius: 24px;
  padding: 1.5rem 2rem; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  z-index: 1000; pointer-events: none;
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
  min-width: 220px;
}
.cheer-banner.wrong-banner {
  border: 3px solid #FF4757;
}
.cheer-banner.correct-banner {
  border: 3px solid #FFD700;
}
@keyframes popIn {
  0%   { transform: translate(-50%, -50%) scale(0); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
@keyframes popOut {
  0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}
.cheer-emoji { font-size: 52px; display: block; margin-bottom: 8px; }
.cheer-text  { font-size: 20px; font-weight: 900; }
.cheer-sub   { font-size: 13px; font-weight: 600; margin-top: 4px; }

/* KruJah Logo */
.krujah-logo {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 0 3px #FFD700, 0 0 0 5px rgba(255,215,0,0.3);
  z-index: 999;
  cursor: pointer;
  transition: all 0.25s;
  animation: floatLogo 3s ease-in-out infinite;
}
.krujah-logo:hover { transform: scale(1.15); box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 3px #FFD700, 0 0 0 8px rgba(255,215,0,0.4); }
.krujah-logo img { width: 100%; height: 100%; object-fit: cover; }
@keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@media print { .krujah-logo { display:none !important; } }

/* Mini Banner */
.mini-banner {
  width: 100%; border-radius: 16px; overflow: hidden;
  margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  max-height: 160px;
}
.mini-banner img {
  width: 100%; height: 160px;
  object-fit: cover; object-position: center top;
  display: block;
}

.mini-banner { width:100%; border-radius:16px; overflow:hidden; margin-bottom:1rem; box-shadow:0 4px 16px rgba(0,0,0,.15); }
.mini-banner img { width:100%; height:auto; display:block; }
</style>
</head>

// แปลง base64 -> Audio URL
const phonicsUrls = {};
(function initPhonics(){
  Object.keys(PHONICS_B64).forEach(k => {
    try {
      const bin = atob(PHONICS_B64[k]);
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const blob = new Blob([bytes],{type:'audio/mp3'});
      phonicsUrls[k] = URL.createObjectURL(blob);
    } catch(e) {}
  });
})();

function playPhonicsLetter(letter, cb){
  const url = phonicsUrls[letter];
  if(!url){ if(cb) setTimeout(cb,300); return; }
  const a = new Audio(url);
  a.playbackRate = 0.9;
  a.onended = cb || null;
  a.play().catch(()=>{ if(cb) setTimeout(cb,300); });
}

// เล่นเสียง C-V-C ทีละตัว พร้อมไฮไลต์
function speakWordPhonics(word, highlightEl, onDone){
  const letters = word.split('');
  // ไฮไลต์กล่อง
  if(highlightEl){
    highlightEl.style.transition = 'box-shadow 0.2s';
  }
  let i = 0;
  function next(){
    if(i >= letters.length){ if(onDone) setTimeout(onDone, 400); return; }
    const letter = letters[i];
    // ไฮไลต์ตำแหน่งตัวอักษร
    if(highlightEl){
      const spans = highlightEl.querySelectorAll('.letter-span');
      spans.forEach((s,idx)=>{ s.style.color = idx===i ? '#FF4757' : '#333'; s.style.transform = idx===i ? 'scale(1.3)' : 'scale(1)'; s.style.transition = 'all 0.2s'; });
    }
    playPhonicsLetter(letter, ()=>{ i++; setTimeout(next, 200); });
  }
  next();
}

function loadVoice(){
  const vs=window.speechSynthesis.getVoices();
  const pref=['Samantha','Karen','Google US English Female','Microsoft Zira'];
  for(const n of pref){const v=vs.find(x=>x.name.includes(n));if(v){voice=v;break;}}
  if(!voice) voice=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||null;
}
if(window.speechSynthesis){loadVoice();window.speechSynthesis.onvoiceschanged=loadVoice;}

function tts(text,rate=0.72){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=1.1;
  if(voice)u.voice=voice;
  window.speechSynthesis.speak(u);
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function buildQuestions(v){
  const pool=shuffle(quizData[v]).slice(0,10);
  return pool.map(correct=>{
    const wrongs=shuffle(quizData[v].filter(x=>x.word!==correct.word)).slice(0,3);
    return { correct, choices:shuffle([correct,...wrongs]) };
  });
}

function startQuiz(){
  questions=buildQuestions(currentVowel);
  currentQ=0; score=0; answered=false;
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('result-card').style.display='none';
  renderQuestion();
}

function renderQuestion(){
  const q=questions[currentQ];
  answered=false;
  document.getElementById('q-num').textContent=`ข้อที่ ${currentQ+1} / ${questions.length}`;
  document.getElementById('q-score').textContent=`⭐ ${score} คะแนน`;
  document.getElementById('q-bar').style.width=`${(currentQ/questions.length)*100}%`;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');

  // choices
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  q.choices.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<div style="font-size:28px">${item.emoji}</div>
      <div>${item.word}</div>
      <div class="choice-sub">${item.ipa}</div>`;
    btn.onclick=()=>answer(btn,item,q.correct);
    choicesEl.appendChild(btn);
  });

  // auto play
  setTimeout(()=>playQuestion(),400);
}

function playQuestion(){
  const q=questions[currentQ];
  tts(q.correct.word,0.7);
  const btn=document.getElementById('listen-btn');
  btn.style.animation='none';
  void btn.offsetWidth;
  btn.style.animation='pulse 2s ease-in-out infinite';
}

function answer(btn,selected,correct){
  if(answered)return;
  answered=true;
  const allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>b.disabled=true);

  const fb=document.getElementById('feedback');
  if(selected.word===correct.word){
    btn.classList.add('correct');
    score++;
    fb.textContent='🌟 ถูกต้อง! เก่งมาก!';
    fb.className='feedback correct';
    tts('Correct! '+correct.word, 0.8);
    showCelebration(true);
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{
      if(b.querySelector('div:nth-child(2)')?.textContent===correct.word) b.classList.add('correct');
    });
    fb.textContent=`❌ คำที่ถูกคือ "${correct.word}" — ฟังเสียงสะกด...`;
    fb.className='feedback wrong';
    showCelebration(false);

    // หา correct button แล้วสร้าง letter spans
    allBtns.forEach(b => {
      const wordDiv = b.querySelectorAll('div')[1];
      if(wordDiv && wordDiv.textContent.trim() === correct.word){
        // แทนที่ข้อความด้วย spans
        const letters = correct.word.split('');
        wordDiv.innerHTML = letters.map((l,idx)=>{
          const color = idx===1 ? '#993C1D' : '#4455CC';
          return `<span class="letter-span" style="color:${color};display:inline-block;transition:all 0.2s;font-size:22px">${l.toUpperCase()}</span>`;
        }).join('<span style="color:#ccc">-</span>');
        // เล่นเสียงสะกดทีละตัว
        setTimeout(()=>{
          speakWordPhonics(correct.word, b, ()=>{
            // หลังสะกดครบ อ่านคำรวม
            setTimeout(()=>{
              tts(correct.word, 0.7);
              fb.textContent = `❌ คำที่ถูกคือ "${correct.word}" ✓ จำไว้นะ!`;
            }, 300);
          });
        }, 800);
      }
    });
  }

  document.getElementById('q-score').textContent=`⭐ ${score} คะแนน`;
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent=currentQ===questions.length-1?'ดูผลคะแนน 🏆':'ข้อถัดไป →';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=questions.length){ showResult(); return; }
  renderQuestion();
}

function showResult(){
  document.getElementById('quiz-card').style.display='none';
  const rc=document.getElementById('result-card');
  rc.style.display='block';
  rc.style.borderColor=vowelColors[currentVowel];
  const pct=score/questions.length;
  const emoji=pct===1?'🏆':pct>=.8?'🌟':pct>=.6?'😊':'💪';
  const title=pct===1?'เยี่ยมยอด!':pct>=.8?'เก่งมาก!':pct>=.6?'ดีมาก!':'สู้ต่อไปนะ!';
  const stars=pct===1?'⭐⭐⭐':pct>=.8?'⭐⭐☆':pct>=.6?'⭐☆☆':'☆☆☆';
  const sub=pct===1?'คะแนนเต็ม! ยอดเยี่ยมมากๆ!':pct>=.8?'เกือบเต็มแล้ว ลองอีกครั้งนะ!':pct>=.6?'ไม่เลว ลองฝึกเพิ่มอีกหน่อยนะ!':'ฝึกในแอปฝึกอ่านก่อนแล้วกลับมาใหม่!';
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-stars').textContent=stars;
  document.getElementById('r-score').textContent=`${score}/${questions.length}`;
  document.getElementById('r-sub').textContent=sub;
  document.getElementById('q-bar').style.width='100%';
}


const correctMessages = [
  {emoji:'🌟', text:'เยี่ยมมาก!', sub:'ถูกต้องเลย!'},
  {emoji:'🎉', text:'สุดยอด!', sub:'เก่งมากเลย!'},
  {emoji:'🏆', text:'แชมป์เลย!', sub:'ถูกทุกอย่าง!'},
  {emoji:'⭐', text:'ฉลาดมาก!', sub:'ไม่มีผิดเลย!'},
  {emoji:'🥳', text:'เก่งมาก!', sub:'อ่านออกเสียงเป็น!'},
];
const wrongMessages = [
  {emoji:'💪', text:'สู้ต่อไป!', sub:'ลองฟังอีกครั้งนะ'},
  {emoji:'😊', text:'ไม่เป็นไร!', sub:'ครั้งหน้าต้องได้!'},
  {emoji:'🌈', text:'ฝึกอีกนิด!', sub:'เดี๋ยวก็เก่งเอง'},
  {emoji:'🤗', text:'ใกล้ถูกแล้ว!', sub:'ลองฟังดูอีกที'},
  {emoji:'📚', text:'เรียนรู้ต่อ!', sub:'ทำได้แน่นอน!'},
];

function showCelebration(isCorrect) {
  const overlay = document.getElementById('overlay');
  const banner  = document.getElementById('cheer-banner');

  // เลือกข้อความ
  const msgs = isCorrect ? correctMessages : wrongMessages;
  const msg  = msgs[Math.floor(Math.random() * msgs.length)];

  // แสดง banner
  banner.className = 'cheer-banner ' + (isCorrect ? 'correct-banner' : 'wrong-banner');
  banner.innerHTML = `<span class="cheer-emoji">${msg.emoji}</span>
    <div class="cheer-text" style="color:${isCorrect?'#C0000A':'#2E86FF'}">${msg.text}</div>
    <div class="cheer-sub" style="color:#666">${msg.sub}</div>`;
  banner.style.display = 'block';
  banner.style.animation = 'popIn .35s cubic-bezier(.34,1.56,.64,1) forwards';

  if (isCorrect) {
    // ดาวกระจาย
    const stars = ['⭐','🌟','✨','💫','🎊','🎉','🏆','❤️'];
    overlay.innerHTML = '';
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = stars[Math.floor(Math.random() * stars.length)];
      p.style.left   = Math.random() * 100 + 'vw';
      p.style.top    = '-40px';
      p.style.animationDelay = (Math.random() * 0.6) + 's';
      p.style.fontSize = (20 + Math.random() * 20) + 'px';
      overlay.appendChild(p);
    }
  }

  // ซ่อนหลัง 1.8 วินาที
  setTimeout(() => {
    banner.style.animation = 'popOut .3s ease forwards';
    setTimeout(() => {
      banner.style.display = 'none';
      overlay.innerHTML = '';
    }, 300);
  }, 1600);
}

function renderTabs(){
  const c=document.getElementById('vtabs'); c.innerHTML='';
  vowels.forEach(v=>{
    const b=document.createElement('button');
    b.className='vtab'+(v===currentVowel?' active':'');
    b.setAttribute('data-v',v);
    b.innerHTML=`<span class="big">${v.toUpperCase()}</span><span class="ipa">${ipaDisplay[v]}</span>`;
    b.onclick=()=>{currentVowel=v;renderTabs();startQuiz();};
    c.appendChild(b);
  });
}

function goHome(){
  const base=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  window.location.href=base+'cvc_homepage.html';
}

renderTabs();
startQuiz();
