body::before{content:'';position:fixed;inset:0;background:rgba(8,4,24,.84);z-index:0;pointer-events:none;}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:1rem 1rem 2rem;}
.mini-banner{width:100%;border-radius:16px;overflow:hidden;margin-bottom:1rem;
  box-shadow:0 4px 16px rgba(0,0,0,.4),0 0 0 2px rgba(255,215,0,.3);}
.mini-banner img{width:100%;display:block;}
.header{background:linear-gradient(135deg,#1a0533,#4a0080);border-radius:20px;
  padding:1rem 1.25rem;margin-bottom:1rem;
  border:2px solid rgba(255,215,0,.4);box-shadow:0 6px 0 rgba(0,0,0,.3);text-align:center;}
.header h1{font-size:20px;font-weight:900;color:#FFD700;}
.header p{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px;}

/* ===== NAME SECTION ===== */
.name-section{background:rgba(255,255,255,.97);border-radius:20px;padding:1.25rem;
  margin-bottom:1rem;border:3px solid #FFD700;box-shadow:0 5px 0 rgba(0,0,0,.12);}
.sec-title{font-size:15px;font-weight:800;color:#4a0080;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}
.name-row{display:flex;gap:8px;margin-bottom:8px;}
.name-input{flex:1;padding:10px 14px;border-radius:12px;border:1.5px solid #ddd;
  font-size:15px;font-family:'Sarabun',sans-serif;outline:none;}
.name-input:focus{border-color:#9B59B6;box-shadow:0 0 0 3px rgba(155,89,182,.15);}
.btn-save{padding:10px 20px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#4a0080,#9B59B6);color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;}
.name-display{background:#f8f5ff;border-radius:10px;padding:8px 14px;
  font-size:13px;color:#4a0080;font-weight:700;display:none;
  display:flex;align-items:center;justify-content:space-between;}
.btn-change{font-size:11px;color:#9B59B6;cursor:pointer;font-weight:700;text-decoration:underline;}

/* ===== LOCKED OVERLAY ===== */
.locked{position:relative;}
.lock-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);
  border-radius:20px;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;}
.lock-icon{font-size:36px;}
.lock-msg{font-size:14px;font-weight:800;color:#4a0080;text-align:center;}
.lock-sub{font-size:12px;color:#888;text-align:center;}

/* ===== VOWEL SUMMARY ===== */
.vowel-sum{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem;}
.vs{border-radius:14px;padding:10px 6px;text-align:center;color:#fff;
  box-shadow:0 4px 0 rgba(0,0,0,.15);}
.vs-letter{font-size:18px;font-weight:900;}
.vs-total{font-size:11px;margin-top:4px;opacity:.9;font-weight:700;}

/* ===== SCORE TABLE ===== */
.score-card{background:rgba(255,255,255,.97);border-radius:20px;padding:1.1rem 1.25rem;
  margin-bottom:1rem;box-shadow:0 5px 0 rgba(0,0,0,.12);}
.card-title{font-size:14px;font-weight:800;color:#4a0080;margin-bottom:10px;
  padding-bottom:8px;border-bottom:2px solid #e0d0ff;display:flex;align-items:center;gap:6px;}
.vtable{width:100%;border-collapse:collapse;font-size:12px;}
.vtable th{padding:6px 6px;text-align:center;color:#fff;font-weight:800;font-size:11px;}
.vtable th:first-child{text-align:left;border-radius:8px 0 0 8px;padding-left:8px;}
.vtable th:last-child{border-radius:0 8px 8px 0;}
.vtable td{padding:6px 6px;border-bottom:1px solid #f0f0f0;text-align:center;}
.vtable td:first-child{text-align:left;font-weight:700;color:#333;padding-left:8px;}
.vtable tr:last-child td{border-bottom:none;}
.ok{background:#20BF55;color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.no{background:#FF4757;color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.na{background:#eee;color:#aaa;padding:2px 7px;border-radius:10px;font-size:10px;}

/* ===== TEST ROWS ===== */
.test-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;}
.test-row:last-child{border-bottom:none;}

/* ===== BUTTONS ===== */
.btn-send{width:100%;padding:14px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#20BF55,#0F6E56);color:#fff;
  font-size:15px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 0 #0F6E56;font-family:'Nunito',sans-serif;
  margin-bottom:.75rem;transition:all .15s;}
.btn-send:active{transform:translateY(2px);box-shadow:0 2px 0 #0F6E56;}
.btn-clear{width:100%;padding:11px;border-radius:50px;border:2px solid #FF4757;
  background:#fff;color:#FF4757;font-size:13px;font-weight:800;cursor:pointer;
  margin-bottom:.75rem;font-family:'Nunito',sans-serif;}
.btn-home{width:100%;padding:11px;border-radius:50px;
  border:2px solid rgba(255,215,0,.5);background:rgba(255,215,0,.1);
  color:#FFD700;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.send-status{font-size:13px;font-weight:700;text-align:center;padding:.5rem 0;min-height:28px;}
.ok-txt{color:#20BF55;}.err-txt{color:#FF4757;}

.krujah-logo{position:fixed;bottom:18px;right:18px;width:62px;height:62px;
  border-radius:50%;border:3px solid #FFD700;z-index:999;cursor:pointer;
  overflow:hidden;animation:fl 3s ease-in-out infinite;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.krujah-logo img{width:100%;height:100%;object-fit:cover;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>

<script>
const VOWELS = ['a','e','i','o','u'];
const VC = {a:'#e8324a',e:'#2474d4',i:'#18a84a',o:'#e07b10',u:'#8a44c8'};
const GAMES = [
  {id:'quiz',     label:'🎯 Quiz',   max:10},
  {id:'spelling', label:'✏️ สะกดคำ',max:8},
  {id:'matching', label:'🧩 จับคู่', max:6},
];
const K_NAME  = 'cvc_player_name';
const K_SC    = 'cvc_scores';
const SHEET   = 'https://script.google.com/macros/s/AKfycbyOPatBVhlj48fZ788CnOzNRqQXpb3zkJCpq62we3AmucLnin-IFE8my9RXEYYKoWYk/exec';

function getScores(){ try{return JSON.parse(localStorage.getItem(K_SC)||'{}');}catch{return{};} }
function getName(){ return localStorage.getItem(K_NAME)||''; }

function initName(){
  const n = getName();
  if(n){
    showNameDisplay(n);
    document.getElementById('lockOverlay').style.display='none';
  } else {
    document.getElementById('nameForm').style.display='block';
    document.getElementById('nameDisplay').style.display='none';
  }
}

function saveName(){
  const n = document.getElementById('nameInput').value.trim();
  if(!n){ alert('กรุณากรอกชื่อก่อนนะคะ'); return; }
  localStorage.setItem(K_NAME, n);
  showNameDisplay(n);
  document.getElementById('lockOverlay').style.display='none';
  render();
}

function showNameDisplay(n){
  document.getElementById('nameForm').style.display='none';
  document.getElementById('nameDisplay').style.display='flex';
  document.getElementById('nameShowText').textContent='👤 '+n;
}

function changeName(){
  document.getElementById('nameForm').style.display='block';
  document.getElementById('nameDisplay').style.display='none';
  document.getElementById('nameInput').value = getName();
}

function render(){
  const sc = getScores();

  // Vowel summary
  const vs = document.getElementById('vowelSum');
  vs.innerHTML = '';
  VOWELS.forEach(v=>{
    const scores = GAMES.map(g=>sc[g.id+'_'+v]).filter(Boolean);
    const tot = scores.reduce((s,x)=>s+x.score,0);
    const mx  = scores.reduce((s,x)=>s+x.max,0);
    const d   = document.createElement('div');
    d.className='vs'; d.style.background=VC[v];
    d.innerHTML=`<div class="vs-letter">/${v}/</div>
      <div class="vs-total">${mx?tot+'/'+mx:'ยังไม่เล่น'}</div>`;
    vs.appendChild(d);
  });

  // Table head
  document.getElementById('tHead').innerHTML =
    `<th style="background:#4a0080">เกม</th>`+
    VOWELS.map(v=>`<th style="background:${VC[v]}">/${v}/</th>`).join('');

  // Table body
  const tb = document.getElementById('tBody');
  tb.innerHTML='';
  GAMES.forEach(g=>{
    const tr=document.createElement('tr');
    let cells=`<td>${g.label}</td>`;
    VOWELS.forEach(v=>{
      const s=sc[g.id+'_'+v];
      if(s){
        const p=Math.round(s.score/s.max*100);
        cells+=`<td><span class="${p>=80?'ok':'no'}">${s.score}/${s.max}</span></td>`;
      }else{
        cells+=`<td><span class="na">-</span></td>`;
      }
    });
    tr.innerHTML=cells;
    tb.appendChild(tr);
  });

  // Pre/Post
  const testDiv=document.getElementById('testRows');
  const tests=[{k:'pretest',l:'📋 Pre-test',m:20},{k:'posttest',l:'🏆 Post-test',m:20}];
  testDiv.innerHTML=tests.map(t=>{
    const s=sc[t.k];
    if(s){
      const p=Math.round(s.score/t.m*100);
      return `<div class="test-row">
        <span>${t.l}</span>
        <div style="text-align:right">
          <span style="font-weight:800">${s.score}/${t.m} (${p}%)</span>&nbsp;
          <span class="${p>=80?'ok':'no'}">${p>=80?'ผ่าน':'ต้องพัฒนา'}</span>
        </div>
      </div>`;
    }
    return `<div class="test-row"><span>${t.l}</span><span class="na">ยังไม่ได้ทำ</span></div>`;
  }).join('');
}

async function sendToSheet(){
  const n = getName();
  if(!n){ alert('กรุณาลงชื่อก่อนนะคะ'); return; }
  const sc = getScores();
  const st = document.getElementById('sendStatus');
  st.textContent='⏳ กำลังส่ง...'; st.className='send-status';
  try{
    await fetch(SHEET,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:n,scores:sc,timestamp:new Date().toLocaleString('th-TH')}),
    });
    st.textContent='✅ ส่งคะแนนให้ครูแล้ว!'; st.className='send-status ok-txt';
  }catch(e){
    st.textContent='❌ ส่งไม่สำเร็จ ลองใหม่อีกครั้ง'; st.className='send-status err-txt';
  }
}

function clearScores(){
  if(!confirm('ล้างคะแนนทั้งหมดใช่ไหม?')) return;
  localStorage.removeItem(K_SC); render();
}
function go(p){
  const b=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  window.location.href=b+p;
}

// อัปเดตทุกครั้งที่กลับมาหน้านี้
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')render();});
window.addEventListener('focus',render);
window.addEventListener('pageshow',render);

initName();
render();
</script>
