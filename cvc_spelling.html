<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Spelling Game — เกมสะกดคำ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', system-ui, sans-serif; background: linear-gradient(160deg,#FFE566 0%,#FFD700 60%,#FFC200 100%); min-height: 100vh; }
.app { padding: 1rem; max-width: 720px; margin: 0 auto; }

.header { text-align:center; background:linear-gradient(135deg,#FF4757,#C0000A); border-radius:24px; padding:1rem; margin-bottom:1rem; box-shadow:0 6px 0 #8B0000; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; top:0; left:-50%; width:200%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); animation:shine 3s infinite; }
@keyframes shine{0%{left:-50%}100%{left:100%}}
.header h1 { font-size:24px; font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); }
.header p { font-size:12px; color:rgba(255,255,255,.9); font-weight:700; margin-top:3px; }

.vowel-tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:1rem; }
.vtab { padding:8px 4px; border-radius:14px; border:2.5px solid rgba(255,255,255,.3); cursor:pointer; font-weight:800; background:rgba(255,255,255,.6); text-align:center; transition:all .18s; box-shadow:0 3px 0 rgba(0,0,0,.12); }
.vtab .big { display:block; font-size:20px; line-height:1.2; }
.vtab .ipa { display:block; font-size:11px; font-weight:700; opacity:.7; }
.vtab[data-v="a"].active{background:#FF4757;color:#fff;border-color:#FF4757;box-shadow:0 4px 0 #8B0000;}
.vtab[data-v="e"].active{background:#2E86FF;color:#fff;border-color:#2E86FF;box-shadow:0 4px 0 #0C447C;}
.vtab[data-v="i"].active{background:#20BF55;color:#fff;border-color:#20BF55;box-shadow:0 4px 0 #0F6E56;}
.vtab[data-v="o"].active{background:#FF8C00;color:#fff;border-color:#FF8C00;box-shadow:0 4px 0 #CC6F00;}
.vtab[data-v="u"].active{background:#9B59B6;color:#fff;border-color:#9B59B6;box-shadow:0 4px 0 #7D3C98;}

/* Score */
.score-bar { background:#fff; border-radius:20px; border:3px solid #2E86FF; box-shadow:0 5px 0 #0C447C; padding:.85rem 1.25rem; margin-bottom:1rem; display:flex; align-items:center; gap:12px; }
.score-item { text-align:center; flex:1; }
.score-label { font-size:10px; font-weight:700; color:#999; text-transform:uppercase; }
.score-val { font-size:24px; font-weight:900; }
.score-divider { width:1px; height:36px; background:#EEE; }

/* Game card */
.game-card { background:#fff; border-radius:24px; border:3px solid #FFD700; box-shadow:0 6px 0 #B8860B; padding:1.25rem; margin-bottom:1rem; }

/* Image + Listen */
.img-area { text-align:center; margin-bottom:1.25rem; }
.word-emoji { font-size:80px; display:block; margin-bottom:.5rem; cursor:pointer; transition:transform .15s; }
.word-emoji:active { transform:scale(.9); }
.listen-hint { font-size:12px; color:#999; font-weight:700; }
.listen-ripple { display:inline-block; width:10px; height:10px; border-radius:50%; background:#FF4757; animation:ripple 1.2s ease-in-out infinite; margin:0 2px; }
@keyframes ripple{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}

/* Answer slots */
.slots-area { display:flex; justify-content:center; gap:10px; margin-bottom:1.5rem; }
.answer-slot {
  width:56px; height:64px; border-radius:14px;
  border:3px dashed #2E86FF;
  background:#EEF4FF;
  display:flex; align-items:center; justify-content:center;
  font-size:32px; font-weight:900; color:#185FA5;
  cursor:pointer; transition:all .15s;
  position:relative;
}
.answer-slot.filled { border-style:solid; border-color:#FFD700; background:#FFFBE6; color:#333; }
.answer-slot.filled:hover { background:#FFF0F1; border-color:#FF4757; }
.answer-slot.correct-slot { border-color:#20BF55; background:#EEFFF5; color:#0F6E56; animation:bounceIn .4s ease; }
.answer-slot.wrong-slot { animation:shake .4s ease; border-color:#FF4757; background:#FFF0F1; }
@keyframes bounceIn{0%{transform:scale(0.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.slot-ipa { position:absolute; bottom:-20px; font-size:10px; color:#AAA; font-weight:700; }

/* Letter buttons */
.letters-label { font-size:12px; font-weight:800; color:#7A5500; text-align:center; margin-bottom:10px; }
.letters-area { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:1.25rem; }
.letter-btn {
  width:56px; height:64px; border-radius:14px;
  border:3px solid #FFD700;
  background:linear-gradient(135deg,#FFFBE6,#FFF3CC);
  font-size:30px; font-weight:900; color:#7A5500;
  cursor:pointer; transition:all .18s;
  box-shadow:0 5px 0 #B8860B;
  font-family:'Nunito',sans-serif;
  display:flex; align-items:center; justify-content:center;
}
.letter-btn:hover { transform:translateY(-3px); box-shadow:0 8px 0 #B8860B; background:linear-gradient(135deg,#FFF3CC,#FFE88A); }
.letter-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #B8860B; }
.letter-btn.used { opacity:.3; cursor:not-allowed; transform:none !important; box-shadow:0 3px 0 #B8860B; }
.letter-btn.c-col { color:#4455CC; border-color:#B0B8FF; background:linear-gradient(135deg,#EEF0FF,#DDE0FF); box-shadow:0 5px 0 #9099EE; }
.letter-btn.v-col { color:#993C1D; border-color:#FFAB76; background:linear-gradient(135deg,#FFF0E6,#FFE0CC); box-shadow:0 5px 0 #EE8844; }

/* Buttons */
.btn-row { display:flex; gap:10px; margin-bottom:.5rem; }
.btn-check { flex:2; padding:13px; border-radius:50px; border:none; background:linear-gradient(135deg,#2E86FF,#185FA5); color:#fff; font-size:16px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 5px 0 #0C447C; transition:all .15s; }
.btn-check:hover { transform:translateY(-2px); box-shadow:0 7px 0 #0C447C; }
.btn-check:disabled { background:linear-gradient(135deg,#CCC,#BBB); box-shadow:0 4px 0 #999; cursor:not-allowed; transform:none; }
.btn-clear { flex:1; padding:13px; border-radius:50px; border:3px solid #FFD700; background:#fff; color:#7A5500; font-size:14px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; transition:all .15s; }
.btn-clear:hover { transform:translateY(-2px); box-shadow:0 6px 0 #B8860B; }
.btn-next { width:100%; padding:13px; border-radius:50px; border:none; background:linear-gradient(135deg,#20BF55,#0F6E56); color:#fff; font-size:16px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 5px 0 #0F6E56; transition:all .15s; display:none; margin-top:8px; }
.btn-next.show { display:block; }
.btn-next:hover { transform:translateY(-2px); box-shadow:0 7px 0 #085041; }

/* Feedback */
.feedback { text-align:center; font-size:16px; font-weight:900; min-height:26px; margin-bottom:.75rem; }
.feedback.correct { color:#20BF55; }
.feedback.wrong { color:#FF4757; }

/* Progress dots */
.progress-dots { display:flex; gap:6px; justify-content:center; margin-bottom:1rem; }
.dot { width:12px; height:12px; border-radius:50%; background:rgba(255,255,255,.4); transition:all .2s; }
.dot.active { background:#2E86FF; transform:scale(1.2); }
.dot.done-correct { background:#20BF55; }
.dot.done-wrong { background:#FF4757; }

/* Celebration */
.overlay { position:fixed; inset:0; pointer-events:none; z-index:998; overflow:hidden; }
.particle { position:absolute; animation:fall 1.4s ease-in forwards; pointer-events:none; }
@keyframes fall{0%{transform:translateY(-60px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.cheer { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border-radius:24px; padding:1.25rem 2rem; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.2); z-index:1000; pointer-events:none; animation:popIn .35s cubic-bezier(.34,1.56,.64,1) forwards; min-width:200px; }
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0)}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes popOut{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(.85);opacity:0}}
.cheer-emoji { font-size:48px; display:block; margin-bottom:6px; }
.cheer-text { font-size:18px; font-weight:900; }
.cheer-sub { font-size:12px; color:#666; font-weight:600; margin-top:3px; }

/* Result */
.result-card { background:#fff; border-radius:24px; border:3px solid #FFD700; box-shadow:0 6px 0 #B8860B; padding:2rem 1.5rem; text-align:center; margin-bottom:1rem; }
.result-emoji { font-size:64px; margin-bottom:.5rem; }
.result-title { font-size:26px; font-weight:900; color:#C0000A; }
.stars { font-size:36px; margin:.5rem 0; letter-spacing:4px; }
.result-score { font-size:42px; font-weight:900; color:#2E86FF; }
.result-sub { font-size:14px; color:#666; font-weight:600; margin:.5rem 0 1.5rem; }
.result-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-retry { padding:12px; border-radius:50px; border:none; background:linear-gradient(135deg,#FF4757,#C0000A); color:#fff; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #8B0000; }
.btn-home-r { padding:12px; border-radius:50px; border:3px solid #FFD700; background:#fff; color:#C0000A; font-size:15px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; }

.home-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:50px; border:3px solid #FFD700; background:linear-gradient(135deg,#fff,#FFFBE6); color:#C0000A; font-size:14px; font-weight:900; cursor:pointer; font-family:'Nunito',sans-serif; box-shadow:0 4px 0 #B8860B; transition:all .18s; margin-top:.25rem; }
.home-btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #B8860B; }

/* KruJah Logo */
.krujah-logo {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 0 3px #FFD700, 0 0 0 5px rgba(255,215,0,0.3);
  z-index: 999;
  cursor: pointer;
  transition: all 0.25s;
  animation: floatLogo 3s ease-in-out infinite;
}
.krujah-logo:hover { transform: scale(1.15); box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 3px #FFD700, 0 0 0 8px rgba(255,215,0,0.4); }
.krujah-logo img { width: 100%; height: 100%; object-fit: cover; }
@keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@media print { .krujah-logo { display:none !important; } }

/* Mini Banner */
.mini-banner {
  width: 100%; border-radius: 16px; overflow: hidden;
  margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  max-height: 160px;
}
.mini-banner img {
  width: 100%; height: 160px;
  object-fit: cover; object-position: center top;
  display: block;
}

.mini-banner { width:100%; border-radius:16px; overflow:hidden; margin-bottom:1rem; box-shadow:0 4px 16px rgba(0,0,0,.15); }
.mini-banner img { width:100%; height:auto; display:block; }
</style>
</head>

let userAnswer=[], currentItem=null, shuffledLetters=[], answered=false, ttsVoice=null;

// Phonics
const phonicsUrls={};
(function(){
  Object.keys(PHONICS_B64).forEach(k=>{
    try{
      const bin=atob(PHONICS_B64[k]);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      phonicsUrls[k]=URL.createObjectURL(new Blob([bytes],{type:'audio/mp3'}));
    }catch(e){}
  });
})();

function loadVoice(){
  const vs=window.speechSynthesis.getVoices();
  const pref=['Samantha','Karen','Google US English Female','Microsoft Zira'];
  for(const n of pref){const v=vs.find(x=>x.name.includes(n));if(v){ttsVoice=v;break;}}
  if(!ttsVoice) ttsVoice=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||null;
}
if(window.speechSynthesis){loadVoice();window.speechSynthesis.onvoiceschanged=loadVoice;}

function tts(text,rate=0.72){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=1.1;
  if(ttsVoice)u.voice=ttsVoice;
  window.speechSynthesis.speak(u);
}

function playPhonics(word, onDone){
  const letters=word.split('');
  let i=0;
  function next(){
    if(i>=letters.length){ if(onDone) setTimeout(onDone,300); return; }
    const url=phonicsUrls[letters[i]];
    if(url){
      const a=new Audio(url); a.playbackRate=0.9;
      a.onended=()=>{i++;setTimeout(next,200);};
      a.play().catch(()=>{i++;setTimeout(next,200);});
    } else { i++;setTimeout(next,200); }
  }
  next();
}

function playCurrentWord(){
  if(!currentItem)return;
  // เล่นเสียงสะกด แล้วอ่านรวม
  playPhonics(currentItem.w, ()=>setTimeout(()=>tts(currentItem.w,0.72),200));
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

function makeLetterPool(word){
  // ใส่ตัวอักษรจริง + ตัวหลอก 2-3 ตัว
  const letters=[...word.split('')];
  const extras='bcdfghjklmnprstwy'.split('').filter(l=>!letters.includes(l));
  const shuffledExtras=shuffle(extras);
  // เพิ่ม 2 ตัวหลอก
  const pool=[...letters,...shuffledExtras.slice(0,2)];
  return shuffle(pool);
}

function startGame(){
  questions=shuffle(gameData[currentVowel]).slice(0,8);
  currentQ=0; correctCount=0; wrongCount=0; score=0;
  document.getElementById('result-card').style.display='none';
  document.getElementById('game-card').style.display='block';
  renderDots();
  loadQuestion();
}

function loadQuestion(){
  answered=false; userAnswer=[];
  currentItem=questions[currentQ];
  shuffledLetters=makeLetterPool(currentItem.w);
  document.getElementById('word-emoji').textContent=currentItem.e;
  document.getElementById('sc-q').textContent=`${currentQ+1}/${questions.length}`;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('btn-check').disabled=true;
  document.getElementById('game-card').style.borderColor=vowelColors[currentVowel];
  renderSlots();
  renderLetters();
  // เล่นเสียงอัตโนมัติ
  setTimeout(()=>playCurrentWord(),400);
}

function renderSlots(){
  const area=document.getElementById('slots-area'); area.innerHTML='';
  for(let i=0;i<currentItem.w.length;i++){
    const slot=document.createElement('div');
    slot.className='answer-slot'; slot.id='slot-'+i;
    // IPA ใต้ slot
    const letter=currentItem.w[i];
    const isVowel='aeiou'.includes(letter);
    const ipa=document.createElement('span');
    ipa.className='slot-ipa';
    ipa.textContent=isVowel?ipaMap[letter]:(consonantIPA[letter]||'');
    slot.appendChild(ipa);
    slot.onclick=()=>removeFromSlot(i);
    area.appendChild(slot);
  }
}

function renderLetters(){
  const area=document.getElementById('letters-area'); area.innerHTML='';
  shuffledLetters.forEach((letter,idx)=>{
    const btn=document.createElement('button');
    const isVowel='aeiou'.includes(letter);
    btn.className='letter-btn '+(isVowel?'v-col':'c-col');
    btn.textContent=letter.toUpperCase();
    btn.id='lbtn-'+idx;
    btn.dataset.idx=idx;
    btn.onclick=()=>addLetter(letter,idx,btn);
    area.appendChild(btn);
  });
}

function addLetter(letter,idx,btn){
  if(answered)return;
  if(btn.classList.contains('used'))return;
  if(userAnswer.length>=currentItem.w.length)return;
  userAnswer.push({letter,idx});
  btn.classList.add('used');
  // แสดงในสล็อต
  const slotIdx=userAnswer.length-1;
  const slot=document.getElementById('slot-'+slotIdx);
  if(slot){
    slot.textContent=letter.toUpperCase();
    slot.classList.add('filled');
    // เพิ่ม ipa กลับ
    const isVowel='aeiou'.includes(letter);
    const ipa=document.createElement('span');
    ipa.className='slot-ipa';
    ipa.textContent=isVowel?ipaMap[letter]:(consonantIPA[letter]||'');
    slot.appendChild(ipa);
    // เล่นเสียงตัวอักษร
    const url=phonicsUrls[letter];
    if(url){const a=new Audio(url);a.playbackRate=0.9;a.play().catch(()=>{});}
  }
  document.getElementById('btn-check').disabled=userAnswer.length<currentItem.w.length;
}

function removeFromSlot(slotIdx){
  if(answered)return;
  if(slotIdx>=userAnswer.length)return;
  // คืนตัวอักษรทั้งหมดหลังจุดที่ลบ
  const removed=userAnswer.splice(slotIdx);
  removed.forEach(({idx})=>{
    const btn=document.getElementById('lbtn-'+idx);
    if(btn) btn.classList.remove('used');
  });
  // re-render slots
  for(let i=0;i<currentItem.w.length;i++){
    const slot=document.getElementById('slot-'+i);
    if(!slot)continue;
    if(i<userAnswer.length){
      const {letter}=userAnswer[i];
      const isVowel='aeiou'.includes(letter);
      slot.innerHTML=`${letter.toUpperCase()}<span class="slot-ipa">${isVowel?ipaMap[letter]:(consonantIPA[letter]||'')}</span>`;
      slot.classList.add('filled');
    } else {
      const isVowel='aeiou'.includes(currentItem.w[i]);
      slot.innerHTML=`<span class="slot-ipa">${isVowel?ipaMap[currentItem.w[i]]:(consonantIPA[currentItem.w[i]]||'')}</span>`;
      slot.classList.remove('filled');
    }
  }
  document.getElementById('btn-check').disabled=userAnswer.length<currentItem.w.length;
}

function clearAnswer(){
  if(answered)return;
  userAnswer=[];
  document.querySelectorAll('.letter-btn').forEach(b=>b.classList.remove('used'));
  renderSlots();
  document.getElementById('btn-check').disabled=true;
  document.getElementById('feedback').textContent='';
}

function checkAnswer(){
  if(answered)return;
  answered=true;
  const typed=userAnswer.map(x=>x.letter).join('');
  const correct=currentItem.w;
  const fb=document.getElementById('feedback');

  if(typed===correct){
    // ถูก
    correctCount++; score+=10;
    fb.textContent='🌟 ถูกต้อง! เก่งมาก!'; fb.className='feedback correct';
    for(let i=0;i<correct.length;i++){
      const slot=document.getElementById('slot-'+i);
      if(slot){slot.classList.add('correct-slot');}
    }
    tts(correct,0.72);
    showCheer(true);
    updateDot(currentQ,'done-correct');
  } else {
    // ผิด — แสดงคำที่ถูกพร้อมเสียงสะกด
    wrongCount++; score=Math.max(0,score-2);
    fb.textContent=`❌ คำที่ถูกคือ "${correct.toUpperCase()}" — ฟังเสียงสะกด...`;
    fb.className='feedback wrong';
    for(let i=0;i<correct.length;i++){
      const slot=document.getElementById('slot-'+i);
      if(slot){ slot.classList.add('wrong-slot'); }
    }
    showCheer(false);
    // แสดงคำที่ถูก แล้วเล่นเสียงสะกด
    setTimeout(()=>{
      clearAnswer();
      // แสดงคำที่ถูกในสล็อต
      correct.split('').forEach((letter,i)=>{
        const slot=document.getElementById('slot-'+i);
        if(slot){
          const isVowel='aeiou'.includes(letter);
          slot.innerHTML=`${letter.toUpperCase()}<span class="slot-ipa">${isVowel?ipaMap[letter]:(consonantIPA[letter]||'')}</span>`;
          slot.classList.add('filled','correct-slot');
        }
      });
      playPhonics(correct,()=>setTimeout(()=>tts(correct,0.72),200));
    },600);
    updateDot(currentQ,'done-wrong');
  }

  document.getElementById('sc-correct').textContent=correctCount;
  document.getElementById('sc-wrong').textContent=wrongCount;
  document.getElementById('sc-score').textContent=score;
  document.getElementById('btn-check').disabled=true;
  const nextBtn=document.getElementById('btn-next');
  nextBtn.classList.add('show');
  nextBtn.textContent=currentQ===questions.length-1?'🏆 ดูผลคะแนน':'➡️ ข้อถัดไป';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=questions.length){ showResult(); return; }
  loadQuestion();
}

function renderDots(){
  const area=document.getElementById('progress-dots'); area.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot-'+i;
    area.appendChild(d);
  });
}

function updateDot(idx,cls){
  const d=document.getElementById('dot-'+idx);
  if(d){d.className='dot '+cls;}
  const next=document.getElementById('dot-'+(idx+1));
  if(next){next.classList.add('active');}
}

function showResult(){
  document.getElementById('game-card').style.display='none';
  document.getElementById('result-card').style.display='block';
  const pct=correctCount/questions.length;
  document.getElementById('r-emoji').textContent=pct===1?'🏆':pct>=.75?'🌟':pct>=.5?'😊':'💪';
  document.getElementById('r-title').textContent=pct===1?'เพอร์เฟกต์!':pct>=.75?'เก่งมาก!':pct>=.5?'ดีมาก!':'สู้ต่อไป!';
  document.getElementById('r-stars').textContent=pct===1?'⭐⭐⭐':pct>=.75?'⭐⭐☆':pct>=.5?'⭐☆☆':'☆☆☆';
  document.getElementById('r-score').textContent=score+' คะแนน';
  document.getElementById('r-sub').textContent=wrongCount===0?'สะกดถูกทั้งหมด! ไม่มีผิดเลย!':wrongCount<=2?'เก่งมาก ผิดนิดเดียว!':'ลองฝึกในแอป CVC แล้วกลับมาใหม่!';
  if(pct===1){
    const o=document.getElementById('overlay'); o.innerHTML='';
    for(let i=0;i<30;i++){
      const p=document.createElement('div'); p.className='particle';
      p.textContent=['⭐','🌟','✨','💫','🎊','🏆','✏️'][Math.floor(Math.random()*7)];
      p.style.cssText=`left:${Math.random()*100}vw;top:-40px;font-size:${20+Math.random()*20}px;animation-delay:${Math.random()*.8}s`;
      o.appendChild(p);
    }
  }
}

const cMsgs=[{e:'🌟',t:'สะกดถูก!',s:'เก่งมาก!'},{e:'🎉',t:'ยอดเยี่ยม!',s:'ถูกต้องเลย!'},{e:'⭐',t:'สุดยอด!',s:'จำได้เลย!'}];
const wMsgs=[{e:'💪',t:'ลองอีกครั้ง!',s:'ฟังเสียงดีๆ นะ'},{e:'😊',t:'ไม่เป็นไร!',s:'ดูคำที่ถูกไว้'},{e:'🤗',t:'สู้ต่อไป!',s:'ครั้งหน้าต้องได้!'}];

function showCheer(ok){
  const overlay=document.getElementById('overlay');
  const cheer=document.getElementById('cheer');
  const msgs=ok?cMsgs:wMsgs;
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  cheer.className='cheer';
  cheer.style.border='3px solid '+(ok?'#FFD700':'#FF4757');
  cheer.innerHTML=`<span class="cheer-emoji">${m.e}</span><div class="cheer-text" style="color:${ok?'#C0000A':'#2E86FF'}">${m.t}</div><div class="cheer-sub">${m.s}</div>`;
  cheer.style.display='block';
  cheer.style.animation='popIn .35s cubic-bezier(.34,1.56,.64,1) forwards';
  if(ok){
    overlay.innerHTML='';
    const icons=['⭐','🌟','✨','💫','✏️','📝'];
    for(let i=0;i<18;i++){
      const p=document.createElement('div'); p.className='particle';
      p.textContent=icons[Math.floor(Math.random()*icons.length)];
      p.style.cssText=`left:${Math.random()*100}vw;top:-40px;font-size:${18+Math.random()*16}px;animation-delay:${Math.random()*.5}s`;
      overlay.appendChild(p);
    }
  }
  setTimeout(()=>{
    cheer.style.animation='popOut .3s ease forwards';
    setTimeout(()=>{cheer.style.display='none';overlay.innerHTML='';},300);
  },1400);
}

function renderTabs(){
  const c=document.getElementById('vtabs'); c.innerHTML='';
  vowels.forEach(v=>{
    const b=document.createElement('button');
    b.className='vtab'+(v===currentVowel?' active':'');
    b.setAttribute('data-v',v);
    b.innerHTML=`<span class="big">${v.toUpperCase()}</span><span class="ipa">${ipaDisplay[v]}</span>`;
    b.onclick=()=>{currentVowel=v;renderTabs();startGame();};
    c.appendChild(b);
  });
}

function goHome(){
  const base=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  window.location.href=base+'cvc_homepage.html';
}

renderTabs();
startGame();
</script>
